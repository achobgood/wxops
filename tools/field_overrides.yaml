# ── field_overrides.yaml ──
# Overrides for the wxcli OpenAPI-based generator (tools/generate_commands.py).
#
# The OpenAPI spec now provides: response schemas, required fields, command types,
# enum values, and descriptions. This file only contains what the spec does NOT provide:
#
#   table_columns       — display columns for CLI table output (per-group or per-command)
#   skip_tags           — glob patterns for OpenAPI tags to skip entirely
#   tag_merge           — merge split tags into one CLI group
#   cli_name_overrides  — human-friendly CLI group names (tag → CLI name)
#   omit_query_params   — query params stripped from all commands
#

# ═══════════════════════════════════════════════════════════════════════════════
# Table columns — display preferences for CLI table output
# ═══════════════════════════════════════════════════════════════════════════════

