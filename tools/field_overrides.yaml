# Emergency Services Settings: most read endpoints return flat singleton dicts.
# The expanded SETTINGS_KEYWORDS catches redSky, emergencyCallbackNumber,
# emergencyCallNotification, complianceStatus. The "status" endpoints need
# explicit overrides since "status" is too generic for the keyword set.
"Emergency Services Settings":
  command_type_overrides:
    # GET /redSky/status — "status" is too generic for SETTINGS_KEYWORDS
    list: settings-get
    # GET /locations/{id}/redSky/status — same issue
    list-status: settings-get

