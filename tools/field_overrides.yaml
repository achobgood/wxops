# Global settings
# ═══════════════════════════════════════════════════════════════════════════════

omit_query_params: []
auto_inject_from_config: ["orgId", "orgid"]

# Tags to skip entirely (glob patterns matched against OpenAPI tag names)
skip_tags:
  - "Beta *"
  # Cross-spec overlaps (identical endpoints already generated from calling spec)
  - "Partner Reports/Templates"
  - "Recording Report"
  - "Reports"
  - "People"
  - "Devices"
  - "Device Call Settings"
  - "Device Call Settings With Device Dynamic Settings"
  - "Hot Desk"
  - "Workspaces"

# Merge split tags into a single CLI group
tag_merge:
  "User Call Settings":
    - "User Call Settings (1/2)"
    - "User Call Settings (2/2)"
  "Workspace Call Settings":
    - "Workspace Call Settings (1/2)"
    - "Workspace Call Settings (2/2)"
  "My Call Settings":
    - "Call Settings For Me"
    - "Call Settings For Me With UserHub Phase2"
    - "Call Settings For Me With UserHub Phase3"
    - "Call Settings For Me Phase 4"
  # Contact Center: merge Journey sub-folders into one group
  "CC Journey":
    - "Journey"
    - "Journey - Customer Identification API"
    - "Journey - Profile Creation & Insights API"

