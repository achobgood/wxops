# ── field_overrides.yaml ──
# Override schema for the wxcli auto-generator (tools/generate_commands.py).
#
# Top-level keys are Postman folder names (exact match).
# Each folder can contain:
#
#   response_list_keys:
#     <command_name>: <json_key>
#     Maps a list command name → the JSON key that wraps the array response.
#     Overrides the auto-derived key (last non-variable URL segment).
#     Example: "list: phoneNumbers" means the API returns {"phoneNumbers": [...]}.
#
#   create:
#     id_key: <json_key>
#     Explicit response key for the created resource's ID. Overrides the default
#     "id" lookup. Example: "id_key: dectNetworkId" extracts result["dectNetworkId"].
#     required_fields: [field1, field2, ...]
#     defaults: { field: value, ... }
#
#   list:
#     table_columns:
#       - ["Header", "json_key"]
#     Default columns for ALL list commands in this folder. Overrides the
#     generator default of [("ID", "id"), ("Name", "name")].
#
#   table_columns:
#     <command_name>:
#       - ["Header", "json_key"]
#     Per-command column overrides. Takes precedence over list.table_columns.
#     Use when different list commands in the same folder return different shapes.
#
# Global keys:
#   skip_folders:     - glob patterns for folders to skip entirely
#   omit_query_params: - query params stripped from all commands (default: [orgId])
#
# Known required fields and defaults discovered during v2 live testing

"Features:  Auto Attendant":
  create:
    required_fields: [name, extension, businessHoursMenu, afterHoursMenu, businessSchedule]
    defaults:
      businessHoursMenu:
        greeting: DEFAULT
        extensionEnabled: true
        keyConfigurations:
          - key: "0"
            action: EXIT
      afterHoursMenu:
        greeting: DEFAULT
        extensionEnabled: true
        keyConfigurations:
          - key: "0"
            action: EXIT
  list:
    table_columns:
      - ["ID", "id"]
      - ["Name", "name"]
      - ["Extension", "extension"]
      - ["Enabled", "enabled"]

"Features:  Call Queue":
  create:
    required_fields: [name, callPolicies]
    defaults:
      callPolicies:
        routingType: PRIORITY_BASED
        policy: CIRCULAR
  list:
    table_columns:
      - ["ID", "id"]
      - ["Name", "name"]
      - ["Extension", "extension"]
      - ["Enabled", "enabled"]

"Features:  Call Park":
  create:
    required_fields: [name, recall]
    defaults:
      recall:
        option: ALERT_PARKING_USER_ONLY
  list:
    table_columns:
      - ["ID", "id"]
      - ["Name", "name"]

"Features:  Hunt Group":
